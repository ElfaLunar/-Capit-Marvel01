<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Captain Marvel Hover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="hover-container">
    <div class="info-text" id="info-text">
      <h2>Captain Marvel</h2>
      <p>
        Carol Danvers, também conhecida como Captain Marvel, é uma das super-heroínas mais poderosas do universo Marvel.
        Ela possui força sobre-humana, pode voar e disparar rajadas de energia de suas mãos.
      </p>
    </div>
    <img class="hero-image" id="hero-image" src="captain-marvel.png" alt="Captain Marvel">
  </div>

  <script src="script.js"></script>
</body>
</html>
